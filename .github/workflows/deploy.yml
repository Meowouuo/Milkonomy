name: Build And Deploy milkonomy
# 推送 main 分支自动构建部署
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # User Pages 模式：meowouuo.github.io/MilkyProfit
          # base 路径设置为仓库名，确保资源路径正确
          VITE_PUBLIC_PATH: /MilkyProfit/
          # 使用 hash 路由模式，避免 GitHub Pages 刷新 404
          VITE_ROUTER_HISTORY: hash

      # fix https://github.com/vitejs/vite/issues/9119
      - name: Create .nojekyll
        run: touch dist/.nojekyll

      # 如果 gh-pages 分支已存在，则删除 dist/data，避免覆盖线上最新 data/
      # 如果 gh-pages 不存在（第一次部署），保留 dist/data 以确保站点可正常运行
      - name: Check gh-pages branch exists
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "HAS_GH_PAGES=true" >> "$GITHUB_ENV"
          else
            echo "HAS_GH_PAGES=false" >> "$GITHUB_ENV"
          fi

      - name: Remove dist/data (keep remote data)
        if: env.HAS_GH_PAGES == 'true'
        run: rm -rf dist/data

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: false # 不清除 gh-pages 上已有文件（例如 data/）
